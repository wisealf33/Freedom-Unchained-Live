<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Member Login | Founders' Circle</title>
    <meta name="description" content="Log in to the Founders' Circle member portal.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600;700;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="apply-page member-login-page">
    <main>
      <section class="application-section member-login-section">
        <div class="application-card member-login-card">
          <a class="brand member-login-logo" href="index.html">Founders' Circle</a>
          <div class="application-intro">
            <h1>Member Login</h1>
            <p>Member accounts are opened after acceptance into the private builder circle.</p>
          </div>

          <form id="member-login-form" class="application-form member-login-form">
            <label>
              <span>Email Address</span>
              <input name="email" type="email" autocomplete="email" placeholder="Email Address" required>
            </label>
            <label>
              <span>Password</span>
              <input name="password" type="password" autocomplete="current-password" placeholder="Password" required>
            </label>
            <button class="button submit-button member-login-button" type="submit">Log In</button>
            <p class="form-note" id="member-login-note" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
