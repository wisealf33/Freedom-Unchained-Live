<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password | Founders' Circle</title>
    <meta name="description" content="Request a Founders' Circle member password reset.">
    <meta name="robots" content="noindex,nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600;700;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="apply-page member-login-page">
    <main>
      <section class="application-section member-login-section">
        <div class="application-card member-login-card">
          <a class="brand member-login-logo" href="index.html">Founders' Circle</a>
          <div class="application-intro">
            <h1>Reset Password</h1>
            <p>Enter the email connected to your member account and we will prepare a password reset path.</p>
          </div>

          <form id="forgot-password-form" class="application-form member-login-form">
            <label>
              <span>Email Address</span>
              <input name="email" type="email" autocomplete="email" placeholder="Email Address" required>
            </label>
            <button class="button submit-button member-login-button" type="submit">Send Reset Link</button>
            <a class="forgot-password-link" href="member-login.html">Back to login</a>
            <p class="form-note" id="forgot-password-note" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>
    <script src="script.js?v=timezone-select-1"></script>
  </body>
</html>
