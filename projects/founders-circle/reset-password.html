<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Choose New Password | Founders' Circle</title>
    <meta name="description" content="Choose a new Founders' Circle member password.">
    <meta name="robots" content="noindex,nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600;700;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="apply-page member-login-page">
    <main>
      <section class="application-section member-login-section">
        <div class="application-card member-login-card">
          <a class="brand member-login-logo" href="index.html">Founders' Circle</a>
          <div class="application-intro">
            <h1>Choose New Password</h1>
            <p>Use the reset link from your email to set a new member password.</p>
          </div>

          <form id="reset-password-form" class="application-form member-login-form">
            <label>
              <span>New Password</span>
              <span class="password-field">
                <input id="new-password" name="password" type="password" autocomplete="new-password" placeholder="New Password" required minlength="10">
                <button class="password-toggle" type="button" data-password-toggle="new-password" aria-label="Show password">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5c5.1 0 8.7 4.4 10 7-1.3 2.6-4.9 7-10 7S3.3 14.6 2 12c1.3-2.6 4.9-7 10-7Zm0 2C8.4 7 5.7 9.8 4.3 12c1.4 2.2 4.1 5 7.7 5s6.3-2.8 7.7-5C18.3 9.8 15.6 7 12 7Zm0 2.2a2.8 2.8 0 1 1 0 5.6 2.8 2.8 0 0 1 0-5.6Z"/>
                  </svg>
                </button>
              </span>
            </label>
            <button class="button submit-button member-login-button" type="submit">Update Password</button>
            <p class="form-note" id="reset-password-note" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>
    <script src="script.js?v=admin-date-overrides-1"></script>
  </body>
</html>
